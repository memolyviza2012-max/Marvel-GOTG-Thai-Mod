[DLL]
; Path to DLL chain (optional - leave empty to use system DLL)
Chain=

; Enable debug logging (0=disabled, 1=enabled)
Debug=1

; Log file location
LogFile=GOTG_Mod.log

[Game]
; Debug string capture mode (0=disabled, 1=enabled)
DebugStringCapture=0

; Game executable version (auto-detected)
; ExeMD5=

[Language]
; Enable Thai translation (0=disabled, 1=enabled)
EnableTranslation=1

; Path to Thai translation JSON file
; The JSON format: { "original_english_text": "thai_translation" }
StringsJSON=strings_th.json

; Custom UI font for Thai characters (optional)
; If empty, will use default game font
UIFont=